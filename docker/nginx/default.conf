server {
    listen 80;
    listen [::]:80;
    
    # Captura cualquier subdominio o dominio base
    server_name ~^(?<subdomain>.+\.)?localhost$;
    # O si usas un dominio real:
    # server_name ~^(?<subdomain>.+\.)?tusitio\.test$ tusitio.test;
    
    root /var/www/html/public;
    index index.php index.html index.htm;
    charset utf-8;

    # Logs con identificación de subdomain
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Pasar el host original a PHP-FPM (CRÍTICO para stancl/tenancy)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # IMPORTANTE: Pasar el host real para que Laravel detecte el tenant
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        
        fastcgi_buffering off;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.ht {
        deny all;
    }

    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;
}