[www]
user = laravel
group = laravel
listen = 9000
listen.owner = laravel
listen.group = laravel

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

pm.status_path = /status
ping.path = /ping
ping.response = pong

catch_workers_output = yes
clear_env = no