services:
  # Laravel PHP-FPM service (primero para que inicie antes)
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    container_name: app_saas_core
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_core_network
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Nginx service
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_saas_core
    ports:
      - "8075:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - saas_core_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Horizon
  # horizon:
  #   build:
  #     context: ./docker/php
  #     dockerfile: Dockerfile
  #     args:
  #       UID: ${UID}
  #       GID: ${GID}
  #   container_name: horizon_saas_core
  #   working_dir: /var/www/html
  #   volumes:
  #     - .:/var/www/html
  #   command: php artisan horizon
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     app:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - saas_core_network

  # Scheduler
  # scheduler:
  #   build:
  #     context: ./docker/php
  #     dockerfile: Dockerfile
  #     args:
  #       UID: ${UID}
  #       GID: ${GID}
  #   container_name: scheduler_saas_core
  #   working_dir: /var/www/html
  #   volumes:
  #     - .:/var/www/html
  #   command: php artisan schedule:work
  #   depends_on:
  #     app:
  #       condition: service_healthy
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - saas_core_network

  # MySQL service
  mysql:
    image: mysql:8.4
    container_name: mysql_saas_core
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: saas_central
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "33071:3306"
    networks:
      - saas_core_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Redis service
  redis:
    image: redis:alpine
    container_name: redis_saas_core
    restart: unless-stopped
    ports:
      - "6393:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_core_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# Volumes
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  saas_core_network:
    name: saas_core_network
    driver: bridge